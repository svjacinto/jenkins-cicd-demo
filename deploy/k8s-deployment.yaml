apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-cicd-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jenkins-cicd-demo
  template:
    metadata:
      labels:
        app: jenkins-cicd-demo
    spec:
      containers:
        - name: jenkins-cicd-demo
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 3000
          env:
            - name: APP_ENV
              value: ENV_PLACEHOLDER
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: jenkins-cicd-demo
spec:
  type: ClusterIP
  selector:
    app: jenkins-cicd-demo
  ports:
    - port: 80
      targetPort: 3000
